processor:
  host: 127.0.0.1
  port: 10001
  reconnect_initial_delay_seconds: 1
  reconnect_max_delay_seconds: 60
  socket_timeout_seconds: 5
  queue_timeout_seconds: 1
  auto_request_coordinator_metadata: true

mqtt:
  broker: 127.0.0.1
  port: 1883
  client_id: inovonics-python-app
  username: ""
  password: ""
  keepalive: 60
  reconnect_initial_delay_seconds: 1
  reconnect_max_delay_seconds: 60
  publish_wait_timeout_seconds: 10
  startup_wait_timeout_seconds: 15
  command_topic: homeassistant
  discovery_prefix: homeassistant
  state_prefix: inovonics

bit_coalescing:
  enabled: true
  quiet_period_ms: 500
  max_hold_ms: 2000
  idle_ttl_ms: 900000
  flush_interval_ms: 250

logging:
  level: INFO
  file: app.log
  max_bytes: 1048576
  backup_count: 5
